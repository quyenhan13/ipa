name: Build IPA for TrollStore

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'   # Bạn thử đổi thành 15.4 hoặc 16.2 nếu vẫn lỗi

      - name: Install CocoaPods
        run: |
          gem install cocoapods
          pod install --repo-update

      - name: Disable code signing in project
        run: |
          /usr/libexec/PlistBuddy -c "Set :objects:CODE_SIGN_STYLE Manual" vteeniovn.xcodeproj/project.pbxproj || true
          /usr/libexec/PlistBuddy -c "Set :objects:DEVELOPMENT_TEAM ''" vteeniovn.xcodeproj/project.pbxproj || true

      - name: Archive with no signing
        run: |
          xcodebuild clean archive \
            -workspace vteeniovn.xcworkspace \
            -scheme vteeniovn \
            -archivePath $RUNNER_TEMP/Median.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            CODE_SIGN_STYLE=Manual \
            EXPANDED_CODE_SIGN_IDENTITY="" 

      - name: Export IPA
        run: |
          mkdir -p ./build
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Median.xcarchive \
            -exportPath ./build \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Median-TrollStore-IPA
          path: ./build/*.ipa
          retention-days: 30

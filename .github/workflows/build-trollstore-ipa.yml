name: Build IPA Clean Fix

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      # Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # Xcode
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      # Clean cache
      - name: Clean DerivedData
        run: rm -rf ~/Library/Developer/Xcode/DerivedData

      # 🔥 FIX CHÍNH: loại XIB khỏi build system
      - name: Remove XIB from build phase
        run: |
          PROJ="vteeniovn.xcodeproj/project.pbxproj"
          cp "$PROJ" "$PROJ.bak"
          perl -i -pe 's/.*\.xib.*//g' "$PROJ"

      # CocoaPods
      - name: Install Pods
        run: |
          gem install cocoapods
          pod install --repo-update

      # Clean build
      - name: Clean build
        run: |
          xcodebuild clean \
            -workspace vteeniovn.xcworkspace \
            -scheme vteeniovn

      # Archive (NO SIGN)
      - name: Archive
        run: |
          xcodebuild archive \
            -workspace vteeniovn.xcworkspace \
            -scheme vteeniovn \
            -archivePath $RUNNER_TEMP/app.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      # Export IPA
      - name: Export IPA
        run: |
          mkdir -p build
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/app.xcarchive \
            -exportPath build \
            -export

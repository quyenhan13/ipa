name: Build IPA Clean Stable Fix

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      # =========================
      # 1. Checkout code
      # =========================
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # 2. Xcode setup
      # =========================
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      # =========================
      # 3. CLEAN POD ENV (QUAN TRỌNG)
      # =========================
      - name: Clean CocoaPods environment
        run: |
          rm -rf Pods
          rm -rf Podfile.lock
          rm -rf ~/Library/Caches/CocoaPods
          rm -rf ~/.cocoapods

      # =========================
      # 4. INSTALL COCOAPODS
      # =========================
      - name: Install CocoaPods
        run: |
          gem install cocoapods
          pod setup
          pod repo update

      # =========================
      # 5. POD INSTALL (FIXED)
      # =========================
      - name: Install Pods
        run: |
          pod install --repo-update --verbose

      # =========================
      # 6. CLEAN BUILD CACHE
      # =========================
      - name: Clean Xcode cache
        run: rm -rf ~/Library/Developer/Xcode/DerivedData

      # =========================
      # 7. CLEAN BUILD
      # =========================
      - name: Clean project
        run: |
          xcodebuild clean \
            -workspace vteeniovn.xcworkspace \
            -scheme vteeniovn

      # =========================
      # 8. ARCHIVE (NO SIGN)
      # =========================
      - name: Archive IPA
        run: |
          xcodebuild archive \
            -workspace vteeniovn.xcworkspace \
            -scheme vteeniovn \
            -archivePath $RUNNER_TEMP/app.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      # =========================
      # 9. EXPORT IPA
      # =========================
      - name: Export IPA
        run: |
          mkdir -p build
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/app.xcarchive \
            -exportPath build \
            -exportOptionsPlist ExportOptions.plist

      # =========================
      # 10. UPLOAD IPA
      # =========================
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: IPA
          path: build/*.ipa

name: Build IPA Clean Fix

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      # 🔥 FIX 1: disable interface builder compile
      - name: Disable IB compilation
        run: |
          defaults write com.apple.InterfaceBuilder3 BuildActiveArchitectureOnly -bool YES || true

      # 🔥 FIX 2: Pods sạch
      - name: Install Pods
        run: |
          gem install cocoapods
          pod install --repo-update

      # 🔥 FIX 3: Clean
      - name: Clean
        run: rm -rf ~/Library/Developer/Xcode/DerivedData

      # 🚀 BUILD
      - name: Archive
        run: |
          xcodebuild archive \
            -workspace vteeniovn.xcworkspace \
            -scheme vteeniovn \
            -archivePath $RUNNER_TEMP/app.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      # 📦 EXPORT
      - name: Export IPA
        run: |
          mkdir -p build
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/app.xcarchive \
            -exportPath build \
            -exportOptionsPlist ExportOptions.plist

      - uses: actions/upload-artifact@v4
        with:
          name: IPA
          path: build/*.ipa

name: Build IPA for TrollStore

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      - name: Install CocoaPods
        run: |
          gem install cocoapods
          pod install --no-repo-update

      - name: Fix duplicate files in Copy Bundle Resources
        run: |
          echo "Removing duplicate references if any..."
          # Xóa InfoPlist.strings bị duplicate (thường gây lỗi archive)
          /usr/libexec/PlistBuddy -c "Delete :objects:.*:files:.*InfoPlist.strings" vteeniovn.xcodeproj/project.pbxproj 2>/dev/null || true

      - name: Archive with no code signing
        run: |
          xcodebuild clean archive \
            -workspace vteeniovn.xcworkspace \
            -scheme vteeniovn \
            -archivePath $RUNNER_TEMP/Median.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            CODE_SIGN_STYLE=Manual \
            EXPANDED_CODE_SIGN_IDENTITY="" \
            -allowProvisioningUpdates

      - name: Export IPA
        run: |
          mkdir -p ./build
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Median.xcarchive \
            -exportPath ./build \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Median-TrollStore-IPA
          path: ./build/*.ipa
          retention-days: 30

name: Build IPA Clean Full

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      # =====================
      # CHECKOUT CODE
      # =====================
      - name: Checkout
        uses: actions/checkout@v4

      # =====================
      # SELECT XCODE
      # =====================
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      # =====================
      # CLEAN EVERYTHING
      # =====================
      - name: Clean environment
        run: |
          rm -rf Pods
          rm -rf Podfile.lock
          rm -rf ~/Library/Developer/Xcode/DerivedData
          rm -rf ~/Library/Caches/CocoaPods
          rm -rf ~/.cocoapods

      # =====================
      # INSTALL COCOAPODS
      # =====================
      - name: Install CocoaPods
        run: |
          gem install cocoapods
          pod setup
          pod install --repo-update --verbose

      # =====================
      # CLEAN BUILD
      # =====================
      - name: Clean Xcode build
        run: |
          xcodebuild clean \
            -workspace vteeniovn.xcworkspace \
            -scheme vteeniovn

      # =====================
      # ARCHIVE (NO SIGN)
      # =====================
      - name: Archive IPA
        run: |
          xcodebuild archive \
            -workspace vteeniovn.xcworkspace \
            -scheme vteeniovn \
            -archivePath $RUNNER_TEMP/app.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      # =====================
      # EXPORT IPA
      # =====================
      - name: Export IPA
        run: |
          mkdir -p build
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/app.xcarchive \
            -exportPath build \
            -exportOptionsPlist ExportOptions.plist

      # =====================
      # UPLOAD IPA
      # =====================
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: IPA
          path: build/*.ipa

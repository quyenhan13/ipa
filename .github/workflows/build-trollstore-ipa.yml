name: Clean IPA Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup Xcode
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      # 3. Clean environment
      - name: Clean system cache
        run: |
          rm -rf ~/Library/Developer/Xcode/DerivedData
          rm -rf Pods
          rm -rf Podfile.lock

      # 4. Install CocoaPods (sạch)
      - name: Install Pods
        run: |
          gem install cocoapods
          pod repo update
          pod install

      # 5. Clean build project
      - name: Clean build
        run: |
          xcodebuild clean \
            -workspace vteeniovn.xcworkspace \
            -scheme vteeniovn

      # 6. Build Archive (NO SIGN)
      - name: Archive IPA
        run: |
          xcodebuild archive \
            -workspace vteeniovn.xcworkspace \
            -scheme vteeniovn \
            -archivePath $RUNNER_TEMP/app.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      # 7. Export IPA
      - name: Export IPA
        run: |
          mkdir -p build
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/app.xcarchive \
            -exportPath build \
            -exportOptionsPlist ExportOptions.plist

      # 8. Upload artifact
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Clean-IPA
          path: build/*.ipa

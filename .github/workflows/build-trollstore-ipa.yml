name: Build IPA for TrollStore

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      # 🔥 FIX TOÀN BỘ LỖI XIB + PLIST
      - name: 🔥 Fix CI (remove XIB + plist lỗi)
        run: |
          echo "Removing all XIB files..."
          rm -rf LeanIOS/*.xib

          echo "Cleaning project.pbxproj..."
          sed -i '' '/.xib/d' vteeniovn.xcodeproj/project.pbxproj

          echo "Fix InfoPlist.strings..."
          rm -f LeanIOS/en.lproj/InfoPlist.strings
          sed -i '' '/InfoPlist.strings/d' vteeniovn.xcodeproj/project.pbxproj

          echo "Clean DerivedData..."
          rm -rf ~/Library/Developer/Xcode/DerivedData

      - name: Install CocoaPods
        run: |
          gem install cocoapods
          pod install --repo-update

      - name: Clean build
        run: |
          xcodebuild clean \
            -workspace vteeniovn.xcworkspace \
            -scheme vteeniovn

      - name: Archive (No Signing - TrollStore)
        run: |
          xcodebuild archive \
            -workspace vteeniovn.xcworkspace \
            -scheme vteeniovn \
            -archivePath $RUNNER_TEMP/Median.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            CODE_SIGN_STYLE=Manual \
            SWIFT_OPTIMIZATION_LEVEL=-Onone \
            -allowProvisioningUpdates

      - name: Export IPA
        run: |
          mkdir -p build
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Median.xcarchive \
            -exportPath build \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TrollStore-IPA
          path: build/*.ipa

name: Build IPA for TrollStore

on:
  push:
    branches: [ main ]
  workflow_dispatch:        # Cho phép bấm "Run workflow" thủ công

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'     # Thay thành phiên bản Xcode bạn đang dùng (kiểm tra trong Xcode)

      - name: Install CocoaPods
        run: |
          gem install cocoapods
          pod install --repo-update

      - name: Archive app (Release)
        run: |
          xcodebuild clean archive \
            -workspace vteeniovn.xcworkspace \
            -scheme vteeniovn \
            -archivePath $RUNNER_TEMP/Median.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Export IPA (no signing)
        run: |
          mkdir -p ./build
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Median.xcarchive \
            -exportPath ./build \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Median-TrollStore-IPA
          path: ./build/*.ipa
          retention-days: 30

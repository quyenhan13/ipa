name: Build IPA for TrollStore

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      # 🔥 FIX THẬT (LOẠI XIB + STORYBOARD KHỎI BUILD)
      - name: 🔥 Remove XIB & Storyboard from project
        run: |
          FILE="vteeniovn.xcodeproj/project.pbxproj"

          cp $FILE backup.pbxproj

          # Xóa mọi reference tới xib + storyboard trong build phase
          grep -vE '\.xib|\.storyboard' backup.pbxproj > $FILE

      # Pods
      - name: Install Pods
        run: |
          gem install cocoapods
          rm -rf Pods Podfile.lock
          pod deintegrate
          pod install --repo-update

      # Clean
      - name: Clean
        run: |
          rm -rf ~/Library/Developer/Xcode/DerivedData
          xcodebuild clean \
            -workspace vteeniovn.xcworkspace \
            -scheme vteeniovn

      # Build
      - name: Archive
        run: |
          xcodebuild archive \
            -workspace vteeniovn.xcworkspace \
            -scheme vteeniovn \
            -archivePath $RUNNER_TEMP/app.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            CODE_SIGN_STYLE=Manual

      - name: Export IPA
        run: |
          mkdir -p build
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/app.xcarchive \
            -exportPath build \
            -exportOptionsPlist ExportOptions.plist

      - uses: actions/upload-artifact@v4
        with:
          name: IPA
          path: build/*.ipa

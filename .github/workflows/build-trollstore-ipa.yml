name: Build IPA for TrollStore

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      # 🔥 FIX XIB NGAY SAU CHECKOUT
      - name: 🔥 Fix XIB (CI-safe)
        run: |
          echo "Fixing XIB files..."

          SAFE_XIB='<?xml version="1.0" encoding="UTF-8"?>
          <document type="com.apple.InterfaceBuilder3.CocoaTouch.XIB" version="3.0"></document>'

          for file in LeanIOS/*.xib; do
            echo "$SAFE_XIB" > "$file"
          done

      # 🔥 FIX PODS
      - name: Install CocoaPods
        run: |
          gem install cocoapods
          rm -rf Pods Podfile.lock
          pod deintegrate
          pod install --repo-update

      # 🔥 CLEAN BUILD
      - name: Clean build
        run: |
          xcodebuild clean \
            -workspace vteeniovn.xcworkspace \
            -scheme vteeniovn

      # 🚀 BUILD IPA
      - name: Archive (no signing)
        run: |
          xcodebuild archive \
            -workspace vteeniovn.xcworkspace \
            -scheme vteeniovn \
            -archivePath $RUNNER_TEMP/Median.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            CODE_SIGN_STYLE=Manual \
            -allowProvisioningUpdates

      - name: Export IPA
        run: |
          mkdir -p build
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Median.xcarchive \
            -exportPath build \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TrollStore-IPA
          path: build/*.ipa
          retention-days: 30

name: Build IPA for TrollStore

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Xcode
      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      # 🔥 3. REMOVE XIB FROM BUILD (AN TOÀN)
      - name: 🔥 Remove XIB from build phase (safe)
        run: |
          echo "Cleaning XIB references safely..."

          # backup
          cp vteeniovn.xcodeproj/project.pbxproj pbxproj.bak

          # chỉ xóa dòng FILE REFERENCE, KHÔNG phá cấu trúc
          awk '
          /\/\* Begin PBXBuildFile section \*\// {inbuild=1}
          /\/\* End PBXBuildFile section \*\// {inbuild=0}
          {
            if(inbuild && $0 ~ /\.xib/) next
            print
          }' pbxproj.bak > vteeniovn.xcodeproj/project.pbxproj

      # 🔥 4. CLEAN PODS
      - name: Install CocoaPods
        run: |
          gem install cocoapods
          rm -rf Pods Podfile.lock
          pod deintegrate
          pod install --repo-update

      # 🔥 5. CLEAN BUILD
      - name: Clean build
        run: |
          rm -rf ~/Library/Developer/Xcode/DerivedData
          xcodebuild clean \
            -workspace vteeniovn.xcworkspace \
            -scheme vteeniovn

      # 🚀 6. ARCHIVE
      - name: Archive (no signing)
        run: |
          xcodebuild archive \
            -workspace vteeniovn.xcworkspace \
            -scheme vteeniovn \
            -archivePath $RUNNER_TEMP/Median.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            CODE_SIGN_STYLE=Manual \
            -allowProvisioningUpdates

      # 📦 7. EXPORT IPA
      - name: Export IPA
        run: |
          mkdir -p build
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Median.xcarchive \
            -exportPath build \
            -exportOptionsPlist ExportOptions.plist

      # 📤 8. UPLOAD
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TrollStore-IPA
          path: build/*.ipa
          retention-days: 30

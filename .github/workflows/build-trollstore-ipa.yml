name: Build IPA for TrollStore

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'     # Thử đổi thành '15.4' nếu vẫn lỗi

      - name: Install CocoaPods
        run: |
          gem install cocoapods
          pod install --no-repo-update

      - name: Archive - Disable XIB compile & signing (for TrollStore)
        run: |
          xcodebuild clean archive \
            -workspace vteeniovn.xcworkspace \
            -scheme vteeniovn \
            -archivePath $RUNNER_TEMP/Median.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            CODE_SIGN_STYLE=Manual \
            EXPANDED_CODE_SIGN_IDENTITY="" \
            IBSC_MODULE= \
            IBSC_SWIFT_VERSION=5.0 \
            GCC_PREPROCESSOR_DEFINITIONS='$GCC_PREPROCESSOR_DEFINITIONS IB_DESIGNABLES=0' \
            SWIFT_OPTIMIZATION_LEVEL=-Onone \
            -allowProvisioningUpdates

      - name: Export IPA
        run: |
          mkdir -p ./build
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Median.xcarchive \
            -exportPath ./build \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Median-TrollStore-IPA
          path: ./build/*.ipa
          retention-days: 30

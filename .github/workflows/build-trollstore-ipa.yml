name: Build IPA for TrollStore

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Chọn Xcode
      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      # 🔥 3. FIX STORYBOARD (QUAN TRỌNG)
      - name: 🔥 Fix Storyboard (LaunchScreen)
        run: |
          echo "Fixing Storyboard..."

          SAFE_STORYBOARD='<?xml version="1.0" encoding="UTF-8"?>
<document type="com.apple.InterfaceBuilder3.CocoaTouch.Storyboard" version="3.0" toolsVersion="18122" targetRuntime="iOS.CocoaTouch" initialViewController="vc">
    <scenes>
        <scene sceneID="scene">
            <objects>
                <viewController id="vc" sceneMemberID="viewController">
                    <view key="view" contentMode="scaleToFill" id="view">
                        <rect key="frame" x="0" y="0" width="375" height="812"/>
                        <color key="backgroundColor" systemColor="systemBackgroundColor"/>
                    </view>
                </viewController>
                <placeholder placeholderIdentifier="IBFirstResponder" id="firstResponder" sceneMemberID="firstResponder"/>
            </objects>
        </scene>
    </scenes>
</document>'

          for file in LeanIOS/*.storyboard; do
            echo "$SAFE_STORYBOARD" > "$file"
          done

      # 🔥 4. FIX XIB
      - name: 🔥 Fix XIB (valid)
        run: |
          echo "Fixing XIB files..."

          SAFE_XIB='<?xml version="1.0" encoding="UTF-8"?>
<document type="com.apple.InterfaceBuilder3.CocoaTouch.XIB" version="3.0" toolsVersion="18122" targetRuntime="iOS.CocoaTouch" propertyAccessControl="none" useAutolayout="YES">
    <objects>
        <tableViewCell contentMode="scaleToFill" id="cell">
            <rect key="frame" x="0" y="0" width="320" height="44"/>
        </tableViewCell>
        <placeholder placeholderIdentifier="IBFilesOwner" id="-1"/>
        <placeholder placeholderIdentifier="IBFirstResponder" id="-2"/>
    </objects>
</document>'

          for file in LeanIOS/*.xib; do
            echo "$SAFE_XIB" > "$file"
          done

      # 🔥 5. FIX PODS
      - name: Install CocoaPods
        run: |
          gem install cocoapods
          rm -rf Pods Podfile.lock
          pod deintegrate
          pod install --repo-update

      # 🔥 6. CLEAN BUILD
      - name: Clean build
        run: |
          rm -rf ~/Library/Developer/Xcode/DerivedData
          xcodebuild clean \
            -workspace vteeniovn.xcworkspace \
            -scheme vteeniovn

      # 🚀 7. ARCHIVE
      - name: Archive (no signing)
        run: |
          xcodebuild archive \
            -workspace vteeniovn.xcworkspace \
            -scheme vteeniovn \
            -archivePath $RUNNER_TEMP/Median.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            CODE_SIGN_STYLE=Manual \
            -allowProvisioningUpdates

      # 📦 8. EXPORT IPA
      - name: Export IPA
        run: |
          mkdir -p build
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Median.xcarchive \
            -exportPath build \
            -exportOptionsPlist ExportOptions.plist

      # 📤 9. UPLOAD
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TrollStore-IPA
          path: build/*.ipa
          retention-days: 30

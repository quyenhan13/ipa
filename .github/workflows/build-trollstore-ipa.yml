name: Build IPA Clean Fix

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Xcode
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      # 🔥 3. REMOVE XIB FROM BUILD PHASE (FIX GỐC LỖI)
      - name: 🔥 Remove XIB from project build phase
        run: |
          FILE="vteeniovn.xcodeproj/project.pbxproj"

          cp $FILE backup.pbxproj

          # Xóa tất cả reference XIB + storyboard khỏi build system
          perl -pi -e 's/.*\.xib.*//g' $FILE
          perl -pi -e 's/.*\.storyboard.*//g' $FILE

          echo "Removed XIB + Storyboard from build phase"

      # 🔥 4. CLEAN PODS
      - name: Install CocoaPods
        run: |
          gem install cocoapods
          rm -rf Pods Podfile.lock
          pod deintegrate
          pod install --repo-update

      # 🔥 5. CLEAN DERIVED DATA
      - name: Clean build cache
        run: |
          rm -rf ~/Library/Developer/Xcode/DerivedData

      # 🚀 6. ARCHIVE (NO SIGN)
      - name: Archive IPA
        run: |
          xcodebuild archive \
            -workspace vteeniovn.xcworkspace \
            -scheme vteeniovn \
            -archivePath $RUNNER_TEMP/app.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            CODE_SIGN_STYLE=Manual

      # 📦 7. EXPORT IPA
      - name: Export IPA
        run: |
          mkdir -p build
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/app.xcarchive \
            -exportPath build \
            -exportOptionsPlist ExportOptions.plist

      # 📤 8. UPLOAD IPA
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Clean-IPA
          path: build/*.ipa

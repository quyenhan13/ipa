name: iOS CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: macos-latest   # macOS runner của GitHub hỗ trợ Xcode

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'   # Thay bằng phiên bản Xcode bạn đang dùng (ví dụ 15.4, 16.2...)

      - name: Install dependencies (nếu dùng CocoaPods)
        run: |
          pod install --repo-update

      - name: Build project
        run: |
          xcodebuild build \
            -workspace YourApp.xcworkspace \     # hoặc -project YourApp.xcodeproj nếu không dùng workspace
            -scheme YourAppScheme \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -sdk iphonesimulator

      - name: Run tests
        run: |
          xcodebuild test \
            -workspace YourApp.xcworkspace \
            -scheme YourAppScheme \
            -destination 'platform=iOS Simulator,name=iPhone 16'

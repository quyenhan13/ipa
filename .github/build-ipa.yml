name: Build IPA for Vteen.io.vn

on:
  workflow_dispatch:      # Chạy thủ công từ GitHub
  push:
    branches: [ main ]
    paths:
      - '**.m'
      - '**.swift'
      - 'Podfile'
      - 'dependencies.json'
      - '.github/workflows/build-ipa.yml'

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install CocoaPods
        run: |
          gem install cocoapods
          pod install --repo-update

      - name: Configure website URL (Vteen.io.vn)
        run: |
          # Thay đổi URL website trong source code Median (thường nằm ở Info.plist hoặc file config)
          # Nếu Median dùng biến hoặc file JSON, bạn có thể chỉnh ở đây
          echo "Setting start URL to http://vteen.io.vn/"
          # Ví dụ: thay thế URL mặc định (bạn cần kiểm tra file nào chứa URL)
          # sed -i '' 's|https://example.com|http://vteen.io.vn|g' LeanIOS/Info.plist || true

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Build and Archive IPA
        run: |
          # Chọn scheme của bạn (thường là tên project: vteeniovn)
          xcodebuild clean archive \
            -workspace vteeniovn.xcworkspace \
            -scheme vteeniovn \
            -configuration Release \
            -archivePath ./build/Vteen.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM=""   # Thay bằng Team ID nếu có

          # Export IPA (development/ad-hoc)
          xcodebuild -exportArchive \
            -archivePath ./build/Vteen.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath ./build

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Vteen-iOS-IPA
          path: ./build/*.ipa
          retention-days: 7

      - name: Show build result
        run: ls -la ./build/

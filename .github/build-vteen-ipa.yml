name: Build Vteen IPA for TrollStore

on:
  workflow_dispatch:     # Nhấn nút "Run workflow" thủ công
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          pod install --repo-update

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Build Archive
        run: |
          xcodebuild clean archive \
            -workspace vteeniovn.xcworkspace \
            -scheme vteeniovn \
            -configuration Release \
            -archivePath ./build/Vteen.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM="" \
            -allowProvisioningUpdates

      - name: Export IPA (for TrollStore)
        run: |
          cat > exportOptions.plist << EOF
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>method</key>
    <string>developer-id</string>
    <key>signingStyle</key>
    <string>manual</string>
    <key>teamID</key>
    <string></string>
</dict>
</plist>
EOF

          xcodebuild -exportArchive \
            -archivePath ./build/Vteen.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath ./build

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Vteen-IPA-TrollStore
          path: ./build/*.ipa
          retention-days: 30
